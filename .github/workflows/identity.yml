name: Identity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  LC_ALL: C
  TZ: UTC

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Verify primitive identity boundary
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f LICENSE
          test -f VERSION
          test -f package.json
          test -f validexor.sh
          grep -q "^# VALIDEXOR$" README.md
          grep -q "^Primitive ID: PRIM-005" README.md
          grep -q "^Package: @verifrax/validexor" README.md
          grep -q "^Binary: validexor" README.md
          python3 -c 'import json, pathlib; d=json.loads(pathlib.Path("package.json").read_text()); assert d["name"]=="@verifrax/validexor"; assert d["version"]=="0.1.0"; assert d["license"]== "Apache-2.0"; assert d["bin"]["validexor"]=="validexor.sh"; assert d["repository"]["url"].endswith("Verifrax/validexor.git"); assert d["homepage"]=="https://github.com/Verifrax/validexor#readme"; assert d["bugs"]["url"]=="https://github.com/Verifrax/validexor/issues"; assert d["publishConfig"]["access"]=="public"' 
