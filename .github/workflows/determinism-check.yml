name: Determinism Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  LC_ALL: C
  TZ: UTC

permissions:
  contents: read

jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hard clean workspace
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          git clean -ffd

      - name: Verify clean workspace
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain=v1)"
          git diff --exit-code

      - name: Verify deterministic CLI behavior
        shell: bash
        run: |
          set -euo pipefail

          TMP_ROOT="$(mktemp -d "${RUNNER_TEMP:-/tmp}/validexor-det-XXXXXXXX")"
          REPO_COPY="$TMP_ROOT/repo"
          RUN_DIR="$TMP_ROOT/run"
          mkdir -p "$REPO_COPY" "$RUN_DIR"

          rsync -a --exclude ".git" . "$REPO_COPY"/

          tree_hash() {
            python3 - "$1" <<PY2
import hashlib
import sys
from pathlib import Path

root = Path(sys.argv[1])
h = hashlib.sha256()

for p in sorted(root.rglob("*")):
    if p.is_file():
        rel = p.relative_to(root).as_posix().encode()
        h.update(rel)
        h.update(b"\0")
        h.update(p.read_bytes())
        h.update(b"\0")

print(h.hexdigest())
PY2
          }

          chmod +x "$REPO_COPY/validexor.sh"

          BEFORE_HASH="$(tree_hash "$REPO_COPY")"

          set +e
          "$REPO_COPY/validexor.sh" < /dev/null > "$RUN_DIR/empty.out" 2>&1
          EMPTY_CODE=$?
          set -e
          printf "%s\n" "$EMPTY_CODE" > "$RUN_DIR/empty.exit"
          test "$EMPTY_CODE" -ne 0

          set +e
          printf "%s\n" "test input" | "$REPO_COPY/validexor.sh" > "$RUN_DIR/output1.txt" 2>&1
          CODE1=$?
          printf "%s\n" "test input" | "$REPO_COPY/validexor.sh" > "$RUN_DIR/output2.txt" 2>&1
          CODE2=$?
          set -e

          printf "%s\n" "$CODE1" > "$RUN_DIR/exit1.txt"
          printf "%s\n" "$CODE2" > "$RUN_DIR/exit2.txt"

          diff -u "$RUN_DIR/output1.txt" "$RUN_DIR/output2.txt"
          diff -u "$RUN_DIR/exit1.txt" "$RUN_DIR/exit2.txt"

          HASH1="$(sha256sum "$RUN_DIR/output1.txt" | cut -d" " -f1)"
          HASH2="$(sha256sum "$RUN_DIR/output2.txt" | cut -d" " -f1)"
          test "$HASH1" = "$HASH2"

          AFTER_HASH="$(tree_hash "$REPO_COPY")"
          test "$BEFORE_HASH" = "$AFTER_HASH"

          echo "PASS: deterministic output, deterministic exit code, no repo-copy mutation"

      - name: Verify clean workspace after test
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain=v1)"
          git diff --exit-code
