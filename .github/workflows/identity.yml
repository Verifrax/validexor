name: Identity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  LC_ALL: C
  TZ: UTC

permissions:
  contents: read

jobs:
  identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify primitive identity boundary
        shell: bash
        run: |
          set -euo pipefail

          test -f README.md
          test -f LICENSE
          test -f VERSION
          test -f package.json
          test -f "validexor.sh"

          grep -F "# VALIDEXOR" README.md
          grep -F "Package: @verifrax/validexor" README.md
          grep -F "Binary: validexor" README.md
          grep -F "package version: 0.1.0" README.md
          grep -F "tag: v0.1.0" README.md
          grep -F "License" README.md

          python3 - <<PY2
          import json
          from pathlib import Path

          data = json.loads(Path("package.json").read_text())

          assert data["name"] == "@verifrax/validexor", data
          assert data["version"] == "0.1.0", data
          assert data["license"] == "MIT", data
          assert data["bin"]["validexor"] == "validexor.sh", data
          assert data["repository"]["url"].endswith("Verifrax/validexor.git"), data
          assert data["homepage"] == "https://github.com/Verifrax/validexor#readme", data
          assert data["bugs"]["url"] == "https://github.com/Verifrax/validexor/issues", data
          assert data["publishConfig"]["access"] == "public", data
          PY2
